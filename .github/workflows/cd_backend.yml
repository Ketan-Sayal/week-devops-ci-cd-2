name: Deploy to backend
on:
  push:
    branches: [ main ] #trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v2 # clone the codebase to ubuntu machine{github actions]
      
      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/Dockerfile.backend
          push: true
          tags: ketansayal2004/todo-app-backend:${{ github.sha }} # github commit id
      - name: Deploy to the VM
        run: |
            echo "${{ secrets.SSH_PRIVATE_KEY }}" &> ~/ssh_key
            chmod 700 /home/runner/ssh_key
            ssh -o StrictHostKeyChecking=no -i ~/ssh_key root@3.90.144.148 -t "docker stop user_backend && docker run --name user_backend -d -p 8080:8080 ketansayal2004/todo-app-backend:${{ github.sha }}"
      

      